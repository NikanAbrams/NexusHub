<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexusHub</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- Auth View -->
    <section id="auth-view" style="display: flex;">
        <div class="auth-card glass" id="tilt-card">
            <h1>NexusHub</h1>
            <p>High-End Affiliate Management</p>
            
            <div id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="manager@nexushub.com" id="login-email">    
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" id="login-password">        
                </div>
                <button class="btn-primary" id="login-btn">Secure Login</button>
                <p style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
                    Don't have an account? <a href="#" id="show-register" style="color: var(--primary);">Register</a>
                </p>
            </div>

            <div id="register-form" style="display: none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Niko" id="reg-name">    
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="manager@nexushub.com" id="reg-email">    
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" id="reg-password">        
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="reg-role" style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; padding: 15px; outline: none; margin-top: 10px;">
                        <option value="Senior Affiliate Manager">Senior Affiliate Manager</option>
                        <option value="Support Agent">Support Agent</option>
                        <option value="Account Manager">Account Manager</option>
                    </select>
                </div>
                <button class="btn-primary" id="register-btn">Create Account</button>
                <p style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
                    Already have an account? <a href="#" id="show-login" style="color: var(--primary);">Login</a>
                </p>
            </div>
        </div>
    </section>

    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('show-register').onclick = (e) => {
            e.preventDefault();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        };
        document.getElementById('show-login').onclick = (e) => {
            e.preventDefault();
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        };

        document.getElementById('register-btn').onclick = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;

            if (!name || !email || !password || !role) {
                alert("All fields are required");
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                const result = await response.json();
                if (result.success) {
                    alert("Registration successful! Please login.");
                    document.getElementById('show-login').click();
                } else {
                    alert(result.message);
                }
            } catch (err) {
                alert("Database error, please try again");
            }
        };
    </script>
</body>
</html>
