<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection History | NexusHub</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <div class="header-title">
            <h2 onclick="window.location.href='dashboard.html'" style="cursor: pointer;">Nexus<span style="color: var(--primary);">Hub</span></h2>
        </div>
        <div class="user-profile">
            <div class="user-info">
                <div class="user-name">Niko</div>
                <div class="user-role">Senior Affiliate Manager</div>
            </div>
            <div class="avatar"></div>
            <button class="btn-primary" id="logout-btn" style="margin-left: 20px; width: auto; padding: 8px 15px; font-size: 0.8rem;">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <div id="detail-header" class="modal-header glass" style="margin-bottom: 20px; padding: 20px; border-radius: 15px;">
            <div id="detail-avatar" class="avatar detail-avatar"></div>
            <div>
                <div class="modal-header-info">
                    <h2 id="detail-name" class="modal-title"></h2>
                    <div id="detail-country-tag" class="country-tag"></div>
                </div>
                <p id="detail-growth-status" style="margin-top: 10px;"></p>
            </div>
        </div>

        <div class="tabs">
            <div class="tab" onclick="navigateTo('detail')">IB Dashboard</div>
            <div class="tab" onclick="navigateTo('marketing')">Marketing Hub</div>
            <div class="tab active" onclick="navigateTo('history')">Connection History</div>
        </div>

        <!-- Tab 3: Connection Status -->
        <div class="tab-pane active" id="connection">
            <div class="table-container glass" style="padding: 20px;">
                <table style="background: transparent;">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Caller</th>
                            <th>Platform</th>
                            <th>Duration</th>
                            <th>Outcome</th>
                            <th>Summary</th>
                        </tr>
                    </thead>
                    <tbody id="calls-tbody"></tbody>
                </table>
            </div>

            <div class="ai-suggestion-box">
                <h4>✨ AI Next Step Strategy</h4>
                <div id="ai-strategy-text"></div>
            </div>
        </div>
    </main>

    <!-- Edit Call Modal -->
    <div id="edit-call-modal" class="modal-overlay">
        <div class="modal-content glass" style="max-width: 500px;">
            <span class="close-btn" id="close-edit-call">&times;</span>
            <h3>Update Call Log</h3>
            <div style="margin-top: 30px;">
                <div class="form-group">
                    <label>Summary Notes</label>
                    <textarea id="edit-summary" rows="4" style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; padding: 15px; outline: none;"></textarea>
                </div>
                <div class="form-group">
                    <label>Outcome Status</label>
                    <select id="edit-outcome">
                        <option value="Positive">Positive</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Resolved">Resolved</option>
                        <option value="Neutral">Neutral</option>
                    </select>
                </div>
                <button class="btn-primary" id="save-call-changes">Update Log Entry</button>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        function navigateTo(tab) {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (tab === 'detail') window.location.href = `affiliate-detail.html?id=${id}`;
            if (tab === 'marketing') window.location.href = `affiliate-marketing.html?id=${id}`;
            if (tab === 'history') window.location.href = `affiliate-history.html?id=${id}`;
        }
    </script>
</body>
</html>
